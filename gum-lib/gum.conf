# Confirm - Box color "$" is no color

G_SELECTED_BACKGROUND_COLOR="#4f565eaa"
G_UNSELECTED_BACKGROUND_COLOR="$"

# Gum text color
GUM_CONFIRMBOX_TEXT_COLOR="$TEXT_COLOR_1"

##====================## 
 #    * GUM BOX *     #
##====================##

# Border Color
G_BORDER_COLOR="$G_BLUE"
G_BOX_TEXT_COLOR="$TEXT_COLOR_1"

##====================## 
 #    * GUM SPIN *     #
##====================##

G_SPINNER="$G_BLUE"
G_SPIN_TEXT="$TEXT_COLOR_1"
#                                                                      #
##====================================================================##


##====================================================================##
#                      Confir yes/no with gum                          #
##====================================================================##
#                                                                      #
#   * Usage: <text>                                                    #
#   * Exemple: gum_confirm  "Confirm"                                  #
#                                                                      #
##====================================================================##
#                                                                      #
gum_confirm() {
    local message="$1"
    gum confirm --padding="$G_PADDING" \
\
      --selected.align="$G_ALIGN" \
      --selected.border="$G_BOX_STYLE" \
      --selected.bold \
      --selected.background="$G_SELECTED_BACKGROUND_COLOR" \
      --selected.foreground="$GUM_SELECTED_TEXT_COLOR" \
\
      --unselected.align="$G_ALIGN" \
      --unselected.border="$G_BOX_STYLE" \
      --unselected.background="$G_UNSELECTED_BACKGROUND_COLOR" \
      --unselected.foreground="$GUM_SELECTED_TEXT_COLOR" \
      --unselected.faint \
\
      --prompt.padding="$G_BOX_PADDING" \
      --prompt.align="$BOX_ALIGN" \
      --prompt.border="$G_BOX_STYLE" \
      --prompt.foreground="$GUM_CONFIRMBOX_TEXT_COLOR" "$message"
}

#                                                                      #
##====================================================================##

##====================================================================##
#                  Gum Text in box - Box text/text box                 #
##====================================================================##
#                                                                      #
#   * Usage:  <text>                                                   #
#   * Exemple: gum_box why??                                           #
#                                                                      #
##====================================================================##
#                                                                      #
# Gum text in box
gum_box() {

    gum style \
      --foreground "$G_BOX_TEXT_COLOR" \
      --border-foreground "$G_BORDER_COLOR" \
      --border="$G_BOX_STYLE" \
      --align "$G_ALIGN" \
      --margin "1 2" \
      --padding "0 1" \
      --bold  "$@"
}
#                                                                      #
##====================================================================##

##====================================================================##
#                              Gum Sipnner                            #
##====================================================================##
#                                                                      #
#   * Usage:  gum_spin <comand>                                        #
#   * Exemple: gum_spin zpool scrub tank                               #
#                                                                      #
#  line, dot, minidot, jump, pulse,                                    #
#  points, globe, moon, monkey, meter, hamburger.                      #
##====================================================================##
#                                                                      #
gum_spin() {
    gum spin \
      --padding="$G_PADDING" \
      --spinner="points" \
      --title="Working" \
      --spinner.foreground="$G_SPINNER" \
      --title.foreground="$G_SPIN_TEXT"  \
      --align "left" \
      "$@"
}
#                                                                      #
##====================================================================##

##====================================================================##
#                              Gum Pager                              #
##====================================================================##
#                                                                      #
#   * Usage:  gum_pager < /path/to/file                                #
#                                                                      #
##====================================================================##
#                                                                      #
gum_pager() {
     gum pager \
       --border-foreground="$G_BOX_STYLE" \
       --foreground="$G_BOX_TEXT_COLOR" \
       --border="$G_BOX_STYLE" \
       "$@"
}
#                                                                      #
##====================================================================##

##====================================================================##
#                             Gum choose                              #
##====================================================================##
#                                                                      #
#   * Usage:  cat text.txt | gum_choose <text>                         #
#                                                                      #
##====================================================================##
#                                                                      #
gum_choose() {
    gum choose \
       --header.border="$G_BOX_STYLE" \
       --header.align="center" --item.align="center" --header.width=25 --header.height=1 \
       --header.border-foreground="" \
       --header.bold \
       --item.foreground="$LIGHT1_GRAY" \
       --cursor.foreground="$G_BOX_TEXT_COLOR2" \
       --no-limit \
       --cursor.bold --cursor="вқҜ " \
       --header "$@"
}