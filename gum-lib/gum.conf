#                                                                      #
# 
# Gum align left - center - right
BOX_ALIGN="center"
G_ALIGN="center"

# Gum padding
G_PADDING="0 2"

# Gum Box style
G_BOX_STYLE="rounded"

# Gum confirm box sice
G_BOX_PADDING="0 45"

# Gum box selected/unselected "yes/no" text color
GUM_SELECTED_TEXT_COLOR="$TEXT_COLOR_2"
GUM_UNSELECTED_TEXT_COLOR="$UNSELECTED_TEXT_COLOR_1"

